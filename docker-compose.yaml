services:
  web:
    build:
      context: .
      args:
        NODE_ENV: development
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/home/app
      - /home/app/node_modules
    command: pnpm dev

  db:
    image: postgres:16-alpine
    ports:
      - '${DATABASE_PORT}:${DATABASE_PORT}'
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_PORT=${DATABASE_PORT}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    container_name: redis-api
    image: redis:latest
    ports:
      - '${REDIS_POST}:${REDIS_POST}'
    environment:
      - REDIS_PORT=${REDIS_POST}
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
